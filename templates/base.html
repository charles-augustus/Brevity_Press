<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrevityPress</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='mystyle.css') }}">
    <!-- Link to Font Awesome for search and stock icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Flexbox container for search, stock ticker, and dropdown */
        #header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: -125px;
            padding: 0 20px;
        }

        /* Flex container for sources and search on the left */
        #left-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* Dropdown menu for news sources */
        .dropdown {
            position: relative;
            display: inline-block;
            margin-bottom: 35px;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            left: 0;
            background-color: #333;
            min-width: 160px;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
            z-index: 1;
            border-radius: 5px;
        }

        .dropdown-content a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-weight: bold;
        }

        .dropdown-content a:hover {
            background-color: #555;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown:hover .dropbtn {
            background-color: #555;
        }

        .dropbtn {
            background-color: #333;
            color: white;
            padding: 10px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        /* Search icon and form */
        #search-container {
            display: flex;
            align-items: center;
            position: relative;
        }

        #search-icon {
            cursor: pointer;
            font-size: 24px;
            color: #333;
        }

        #search-form {
            display: none; /* Hidden by default */
            position: absolute;
            left: 40px; /* Position it right of the search icon */
        }

        #search-form.active {
            display: flex;
        }

        #search-input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 200px;
            font-size: 16px;
            font-weight: bold;
            margin-left: 10px;
        }

        #search-btn {
            padding: 8px 12px;
            border: none;
            background-color: #333;
            color: white;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            margin-left: 5px;
        }

        #search-btn:hover {
            background-color: #555;
        }

        /* Styling for stock ticker */
        #stock-ticker-container {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            height: 40px;
            line-height: 40px;
            text-align: right;
        }

        #stock-ticker {
            display: flex;
            flex-direction: column;
            width: 100%;
            overflow: hidden;
        }

        #stock-ticker div {
            display: none;
        }

        #stock-ticker div.active {
            display: flex;
        }

        .stock-item {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-size: 14px;
        }

        .stock-name {
            font-weight: bold;
            margin-right: 10px;
        }

        .stock-price {
            font-size: 12px;
            margin-right: 5px;
        }

        .stock-change.positive {
            color: green;
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        .stock-change.negative {
            color: red;
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        .stock-change i {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div id="main_image_container">
        <a href="{{ url_for('index') }}">
            <img id="main_image" src="{{ url_for('static', filename='bp.png') }}">
        </a>
    </div>
    
    <!-- Flexbox container for Search, Stock Ticker, and Sources Dropdown -->
    <div id="header-bar">
        <!-- Left section for sources and search -->
        <div id="left-section">
            <!-- News Sources Dropdown -->
            <div class="dropdown">
                <button class="dropbtn">News Sources</button>
                <div class="dropdown-content">
                    <a href="{{ url_for('section', rss_title='all', page=1) }}">All Sources</a>
                    {% for rss in rss_array %}
                    <a href="{{ url_for('section', rss_title=rss['source'], page=1) }}">
                        {{ rss['source'] | title }}
                    </a>
                    {% endfor %}
                </div>
            </div>

            <!-- Search Icon and Form -->
            <div id="search-container">
                <i id="search-icon" class="fas fa-search"></i>
                <form id="search-form" action="{{ url_for('search') }}" method="GET">
                    <input id="search-input" type="text" name="query" placeholder="Search articles..." required>
                    <button id="search-btn" type="submit">Search</button>
                </form>
            </div>
        </div>

        <!-- Stock Ticker -->
        <div id="stock-ticker-container">
            <div id="stock-ticker">
                <!-- Stock data will be inserted here -->
            </div>
        </div>
    </div>

    <hr>
    
    <!-- Content Block -->
    {% block content %}
    {% endblock %}

    <script>
        // Toggle the search form when the search icon is clicked
        document.getElementById("search-icon").addEventListener("click", function() {
            var searchForm = document.getElementById("search-form");
            searchForm.classList.toggle("active");
        });

        // Fetch stock data from Flask backend
        async function fetchStocks() {
            const response = await fetch('/stocks');
            const stockData = await response.json();

            const stockTicker = document.getElementById("stock-ticker");
            stockTicker.innerHTML = ''; // Clear existing stock data

            // Insert new stock data into the ticker
            stockData.forEach(stock => {
                const stockElement = document.createElement("div");
                stockElement.className = 'stock-item';
                stockElement.innerHTML = `
                    <span class="stock-name">${stock.ticker}</span>
                    <span class="stock-price">₹${stock.price}</span>
                    <span class="stock-change ${parseFloat(stock.change) >= 0 ? 'positive' : 'negative'}">
                        <i class="fas fa-arrow-${parseFloat(stock.change) >= 0 ? 'up' : 'down'}"></i>
                        ${stock.change}
                    </span>
                `;
                stockTicker.appendChild(stockElement);
            });

            // Show the first stock item
            let currentStockIndex = 0;
            const stockItems = document.querySelectorAll('#stock-ticker div');
            stockItems[0].classList.add('active');

            // Rotate stock items every 5 seconds
            setInterval(() => {
                stockItems[currentStockIndex].classList.remove('active');
                currentStockIndex = (currentStockIndex + 1) % stockItems.length;
                stockItems[currentStockIndex].classList.add('active');
            }, 5000);

            // Repeat fetching stocks every 10 minutes to refresh data
            setTimeout(fetchStocks, 600000);
        }

        // Initialize stock ticker
        fetchStocks();
    </script>
</body>
</html>
